name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: set
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # The app and migrations both point at the CI Postgres service.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/set
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/set
      # No Resend key: magic links print to the server log (we read the token
      # from the DB in the e2e test, so no real mail is needed).
      AUTH_RESEND_KEY: ""
      RESEND_FROM_EMAIL: "PAUAA <onboarding@resend.dev>"
      EMAIL_MODE: sandbox
      SANDBOX_INBOX: ci@example.test
      SUPER_ADMIN_EMAIL: ofoma.chudi@gmail.com
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate run secrets
        run: |
          echo "AUTH_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"
          echo "PHONE_ENC_KEY=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - name: Apply migrations
        run: npm run db:migrate

      - name: Apply RLS policies
        run: psql "$DATABASE_URL" -f src/db/policies.sql

      - name: Seed super admin + bus campaign
        run: |
          npm run db:seed
          npx tsx scripts/seed-bus.ts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
